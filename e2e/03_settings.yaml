# ════════════════════════════════════════════════════════════════
# Urban Noise Sanctuary — 設定画面 E2E シナリオ
#
# 実行方法:
#   maestro test e2e/03_settings.yaml
#
# 前提: オンボーディング完了済み状態
# 検証ポイント:
#   - 設定タブへの遷移
#   - 通知・ハプティクスのトグル表示
#   - プライバシーセクションの表示
# ════════════════════════════════════════════════════════════════

appId: urban-noise-sanctuary
---

- launchApp:
    clearState: true

- runFlow: flows/complete_onboarding.yaml

# ── 設定タブへ遷移 ───────────────────────────────────────────────
- tapOn: "設定"
- assertVisible: "通知"
- assertVisible: "プライバシー"

# ── 通知トグル ───────────────────────────────────────────────────
- tapOn: "通知"

# ── 設定画面を閉じてメインに戻る ─────────────────────────────────
- tapOn: "◉"
- assertVisible: "Sanctuaryを展開する"
